<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460" fill="none" role="img" aria-label="Flat illustration of a team building IT infrastructure and software" width="560" height="460">
  <title>TCM Technology — IT infrastructure and software team</title>
  <defs>
    <linearGradient id="hb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#dcebff"/>
    </linearGradient>
    <linearGradient id="hp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f80ed"/>
      <stop offset="1" stop-color="#1565d8"/>
    </linearGradient>
  </defs>

  <!-- soft backdrop blob -->
  <path d="M120 60C60 92 28 168 56 250c30 88 130 132 244 124 110-8 206-58 214-150 7-86-66-150-160-176C480 30 196 20 120 60Z" fill="url(#hb)"/>

  <!-- back: cloud -->
  <g>
    <path d="M386 96c-6-22-26-38-50-38-20 0-37 11-46 28-3-1-6-1-9-1-19 0-34 15-34 34s15 34 34 34h104c17 0 31-14 31-31 0-15-12-28-27-30 0-1 .5-.7-3 4Z" fill="#ffffff"/>
    <path d="M281 117h84M281 130h64" stroke="#a9d1ff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- dashboard / BI screen (left) -->
  <g>
    <rect x="46" y="150" width="180" height="128" rx="10" fill="#ffffff" stroke="#d7e6ff" stroke-width="2"/>
    <rect x="46" y="150" width="180" height="26" rx="10" fill="url(#hp)"/>
    <rect x="46" y="166" width="180" height="10" fill="url(#hp)"/>
    <circle cx="60" cy="163" r="3.4" fill="#ffffff"/>
    <circle cx="71" cy="163" r="3.4" fill="#a9d1ff"/>
    <circle cx="82" cy="163" r="3.4" fill="#a9d1ff"/>
    <!-- bars -->
    <rect x="64" y="240" width="16" height="22" rx="3" fill="#6fb1fc"/>
    <rect x="88" y="226" width="16" height="36" rx="3" fill="#2f80ed"/>
    <rect x="112" y="214" width="16" height="48" rx="3" fill="#1565d8"/>
    <rect x="136" y="232" width="16" height="30" rx="3" fill="#6fb1fc"/>
    <!-- trend line -->
    <path d="M70 210l24-14 24 8 24-18 28-6" stroke="#f5a524" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="194" cy="186" r="4" fill="#f5a524"/>
    <!-- donut -->
    <circle cx="186" cy="234" r="18" fill="none" stroke="#e0ecff" stroke-width="7"/>
    <path d="M186 216a18 18 0 0 1 14 29" fill="none" stroke="#2bb6a3" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- server rack (right) -->
  <g>
    <rect x="392" y="150" width="120" height="170" rx="12" fill="#ffffff" stroke="#d7e6ff" stroke-width="2"/>
    <g>
      <rect x="406" y="166" width="92" height="30" rx="6" fill="#eef5ff"/>
      <rect x="406" y="204" width="92" height="30" rx="6" fill="#eef5ff"/>
      <rect x="406" y="242" width="92" height="30" rx="6" fill="#eef5ff"/>
      <rect x="406" y="280" width="92" height="30" rx="6" fill="#eef5ff"/>
    </g>
    <g fill="#1565d8">
      <circle cx="418" cy="181" r="4"/><circle cx="418" cy="219" r="4"/><circle cx="418" cy="257" r="4"/><circle cx="418" cy="295" r="4"/>
    </g>
    <g fill="#2bb6a3">
      <circle cx="432" cy="181" r="4"/><circle cx="432" cy="219" r="4"/>
    </g>
    <g stroke="#a9d1ff" stroke-width="3" stroke-linecap="round">
      <path d="M450 181h36M450 219h36M450 257h36M450 295h36"/>
    </g>
  </g>

  <!-- connector lines: dashboard <-> server -->
  <path d="M226 250c40 18 92 18 160 6" stroke="#6fb1fc" stroke-width="2.5" stroke-dasharray="2 8" stroke-linecap="round" fill="none"/>

  <!-- person A (left, presenting) -->
  <g>
    <ellipse cx="196" cy="430" rx="78" ry="12" fill="#d7e6ff"/>
    <rect x="170" y="338" width="56" height="78" rx="22" fill="url(#hp)"/>
    <rect x="170" y="372" width="56" height="44" rx="14" fill="#1565d8"/>
    <circle cx="198" cy="318" r="20" fill="#ffd9a8"/>
    <path d="M180 312c0-12 10-20 18-20s18 8 18 18c-6-4-12-5-18-5s-12 3-18 7Z" fill="#0f1f3d"/>
    <!-- arm pointing -->
    <path d="M226 360c18-2 34-10 44-22" stroke="#ffd9a8" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- person B (right, with laptop) -->
  <g>
    <ellipse cx="372" cy="432" rx="74" ry="11" fill="#d7e6ff"/>
    <rect x="346" y="346" width="52" height="72" rx="20" fill="#2bb6a3"/>
    <circle cx="372" cy="326" r="19" fill="#ffd9a8"/>
    <path d="M355 322c0-12 9-19 17-19s17 7 17 17c-5-3-11-5-17-5s-11 3-17 7Z" fill="#3a2a18"/>
    <!-- laptop -->
    <rect x="338" y="392" width="68" height="40" rx="5" fill="#0f1f3d"/>
    <rect x="344" y="398" width="56" height="28" rx="3" fill="#2f80ed"/>
    <path d="M334 432h76l6 8h-88z" fill="#16264a"/>
  </g>

  <!-- floating gear (software) -->
  <g transform="translate(470 96)">
    <path d="M14 0l3 6 7-1 1 7 6 3-3 6 3 6-6 3-1 7-7-1-3 6-3-6-7 1-1-7-6-3 3-6-3-6 6-3 1-7 7 1z" fill="#fff4e3" stroke="#f5a524" stroke-width="2"/>
    <circle cx="14" cy="20" r="7" fill="#f5a524"/>
  </g>

  <!-- code tag chip -->
  <g transform="translate(40 96)">
    <rect width="78" height="34" rx="10" fill="#ffffff" stroke="#d7e6ff" stroke-width="2"/>
    <path d="M22 12l-7 5 7 5M56 12l7 5-7 5M44 9l-9 16" stroke="#1565d8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
